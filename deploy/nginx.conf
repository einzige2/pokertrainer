# /etc/nginx/sites-available/pokertrainer
# Symlink to /etc/nginx/sites-enabled/ and run: certbot --nginx -d yourdomain.com

server {
    listen 80;
    server_name yourdomain.com;

    # certbot will replace this block with HTTPS redirect + SSL config
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name yourdomain.com;

    # Managed by certbot — these lines will be filled in after running certbot
    # ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    location /sms {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    # Block everything else — this server only exists to receive Twilio webhooks
    location / {
        return 404;
    }
}
